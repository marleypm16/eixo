version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_dev
    restart: always
    env_file: .env.dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend_dev
    ports:
      - "8080:8080"
    env_file: .env.dev
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    command: air # hot reload (opcional)

  frontend:
    build: ./frontend
    container_name: frontend_dev
    env_file: .env.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  postgres_data_dev:
